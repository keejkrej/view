[build-system]
requires = ["hatchling>=1.27", "pathspec<1"]
build-backend = "hatchling.build"

[project]
name = "view-grid-py"
version = "0.1.0"
description = "Reusable grid and bbox helpers shared with the view app"
requires-python = ">=3.11"

[tool.hatch.build.targets.wheel]
packages = ["src/view_grid"]
